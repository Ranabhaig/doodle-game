name: Build Cordova Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to run the build manually from the Actions tab

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Recommended for Cordova 12

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Required for newer Android SDKs and Gradle versions

      - name: Install Cordova CLI
        run: npm install -g cordova@12

      - name: Install npm dependencies
        run: npm install

      - name: Add Android Platform
        # This will also automatically parse your config.xml and install cordova-plugin-websockets-server
        run: cordova platform add android@12 

      - name: Build Android APK (Debug)
        run: cordova build android --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DoodleSquad-MP-APK
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

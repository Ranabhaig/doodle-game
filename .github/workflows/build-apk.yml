name: Build Cordova APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '11' # JDK 11 is the "sweet spot" for Cordova stability

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova
        run: npm install -g cordova@12.0.0

      - name: Install Project Dependencies
        run: npm install

      # FIX: Force a compatible Android platform version
      - name: Add Android Platform
        run: cordova platform add android@12.0.0

      # FIX: This environment variable often bypasses Gradle/XmlParser script errors
      - name: Build Debug APK
        run: cordova build android --debug
        env:
          ORG_GRADLE_PROJECT_cdvMinSdkVersion: 24
